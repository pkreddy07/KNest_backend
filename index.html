<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNest - Open Study Notes</title>
    <link href="./src/main.css" rel="stylesheet">
</head>
<body class="bg-brand-darker text-white font-body">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 transition-all duration-300 backdrop-blur-md bg-brand-darker/60 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center">
                    <a href="index.html" class="text-3xl font-extrabold font-sans tracking-tight text-white flex items-center gap-2">
                        <svg class="w-8 h-8 text-brand-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        KNest
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="leaderboard.html" class="hover:text-brand-secondary px-3 py-2 rounded-md text-sm font-medium transition-colors">Leaderboard</a>
                        <a href="index.html" class="hover:text-brand-secondary px-3 py-2 rounded-md text-sm font-medium transition-colors">Trending</a>
                        <a href="#" class="bg-brand-primary hover:bg-brand-accent px-5 py-2 rounded-full text-sm font-bold transition-all shadow-lg shadow-brand-primary/20">Login</a>
                    </div>
                </div>
                <!-- Hamburger Button -->
                <div class="-mr-2 flex md:hidden">
                    <button id="menu-btn" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none">
                        <svg class="h-8 w-8" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu (Hidden by default) -->
    <div id="mobile-menu" class="fixed inset-y-0 right-0 w-64 bg-slate-900/95 backdrop-blur-xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-white/10 shadow-2xl">
        <div class="p-6">
            <div class="flex justify-end mb-8">
                <button id="close-menu-btn" class="text-white hover:text-brand-secondary">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-6">
                <a href="index.html" class="block text-xl font-medium text-white hover:text-brand-secondary transition-colors">Home</a>
                <a href="leaderboard.html" class="block text-xl font-medium text-white hover:text-brand-secondary transition-colors">Leaderboard</a>
                <a href="#" class="block text-xl font-medium text-white hover:text-brand-secondary transition-colors">Trending</a>
                <a href="profile.html" class="block text-xl font-medium text-white hover:text-brand-secondary transition-colors">My Profile</a>
                <a href="view-profile.html" class="block text-xl font-medium text-white hover:text-brand-secondary transition-colors">Find Peers</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
        <!-- Floating Elements Background -->
        <div class="absolute top-20 left-10 w-72 h-72 bg-brand-primary rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse-slow"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-brand-secondary rounded-full mix-blend-multiply filter blur-[128px] opacity-20 animate-pulse-slow"></div>

        <div class="max-w-md w-full relative z-10">
            <!-- Glass Card -->
            <div class="glass-panel p-8 md:p-10 animate-float">
                <div class="text-center mb-8">
                    <h2 id="form-title" class="text-4xl font-extrabold font-sans text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-white mb-2">Welcome Back</h2>
                    <p class="text-slate-400">Your gateway to unlimited knowledge</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                        <input type="email" placeholder="student@university.edu" class="input-field">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                        <input type="password" placeholder="••••••••" class="input-field">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center text-slate-400 cursor-pointer">
                            <input type="checkbox" class="form-checkbox bg-slate-800 border-slate-700 text-brand-primary rounded focus:ring-0 mr-2"> Remember me
                        </label>
                        <a href="#" class="text-brand-secondary hover:text-brand-accent transition-colors">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full btn-primary">Sign In</button>
                    <div class="text-center mt-6">
                        <p class="text-slate-400 text-sm">Don't have an account? <button id="show-signup" class="text-brand-secondary hover:text-brand-accent font-bold ml-1 transition-colors">Sign Up</button></p>
                    </div>
                </form>

                <!-- Signup Form (Hidden) -->
                <form id="signup-form" class="space-y-6 hidden">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Full Name</label>
                        <input type="text" placeholder="John Doe" class="input-field">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                        <input type="email" placeholder="student@university.edu" class="input-field">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                        <input type="password" placeholder="Create a strong password" class="input-field">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Confirm Password</label>
                        <input type="password" placeholder="Confirm your password" class="input-field">
                    </div>
                    <button type="submit" class="w-full btn-primary">Create Account</button>
                    <div class="text-center mt-6">
                        <p class="text-slate-400 text-sm">Already member? <button id="show-login" class="text-brand-secondary hover:text-brand-accent font-bold ml-1 transition-colors">Login</button></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
